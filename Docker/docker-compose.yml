services:
  frontend:
    image: zuttiwhv/vereinskasse-frontend:latest
    container_name: vereinskasse-frontend
    restart: on-failure:3
    environment:
      # Muss auf jeden Fall angepasst werden
      - BACKEND_URL=https://deine-server-ip:8443
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs
